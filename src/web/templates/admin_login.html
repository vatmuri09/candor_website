<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin login — SparkMe</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at 20% 20%, #7c5cff 0%, #4b3ad6 45%, #241f5c 100%);
      display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
    }
    .box {
      background: #fff; padding: 36px 32px; border-radius: 16px; width: 320px;
      box-shadow: 0 24px 70px rgba(20,10,60,.35);
    }
    h1 { font-size: 21px; margin: 0 0 4px; color: #1b1730; }
    .sub { font-size: 13.5px; color: #9490a8; margin-bottom: 20px; }
    input {
      width: 100%; padding: 12px 13px; margin-bottom: 14px; box-sizing: border-box;
      border: 2px solid #e6e3f5; border-radius: 9px; font-size: 14.5px;
    }
    input:focus { outline: none; border-color: #7c5cff; }
    button {
      width: 100%; padding: 12px; background: linear-gradient(135deg, #7c5cff, #4b3ad6);
      color: #fff; border: none; border-radius: 9px; cursor: pointer; font-size: 15px;
      font-weight: 700;
    }
    button:hover { filter: brightness(1.05); }
    .err { color: #c0392b; font-size: 13.5px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <form class="box" method="POST">
    <h1>✨ SparkMe Admin</h1>
    <p class="sub">Sign in to manage interviews.</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <input type="password" name="password" placeholder="Password" autofocus>
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
