<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Interview Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .instructions-panel {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .instructions-panel h3 {
            margin-top: 0;
            color: #333;
        }
        .instructions-panel ul {
            margin: 10px 0;
            padding-left: 20px;
        }
        .instructions-panel li {
            margin: 8px 0;
            color: #666;
        }
        .control-panel {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toggle-switch input[type="checkbox"] {
            width: 40px;
            height: 20px;
            cursor: pointer;
        }
        .toggle-switch label {
            cursor: pointer;
            user-select: none;
        }
        #end-session-btn {
            background-color: #ff9800;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-left: auto;
        }
        #end-session-btn:hover {
            background-color: #f57c00;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        #status {
            margin-top: 10px;
            color: #666;
            font-style: italic;
        }
        .tts-indicator {
            display: inline-block;
            margin-left: 5px;
            color: #2196F3;
        }
        #chat-form {
            display: flex !important;
            align-items: center !important;
            justify-content: flex-start !important;
            gap: 10px !important;
            position: relative !important;
            padding: 10px 0;
        }
        #chat-input {
            flex: 1 !important;
            min-height: 42px;
            padding: 10px;
            border-radius: 18px;
            border: 1px solid #ccc;
            resize: none;
            margin: 0 !important;
        }
        #record-toggle {
            width: 40px !important;
            height: 40px !important;
            min-width: 40px !important;
            border-radius: 50%;
            background: #eee;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            border: none;
            cursor: pointer;
            margin: 0 !important;
            position: static !important;
            flex-shrink: 0 !important;
            z-index: 1;
        }
        .chat-send {
            width: 40px !important;
            height: 40px !important;
            min-width: 40px !important;
            border-radius: 50%;
            border: none;
            background: #4CAF50;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            margin: 0 !important;
            position: static !important;
            flex-shrink: 0 !important;
            z-index: 1;
        }
        #record-toggle::before { content: "🎤"; font-size: 18px; }
        #record-toggle.recording::before { content: "⏹️"; }
        .chat-send:disabled {
            background: #bdbdbd !important;
            cursor: not-allowed;
            opacity: 0.7;
        }
        #record-toggle:disabled {
            background: #e0e0e0 !important;
            cursor: not-allowed;
            opacity: 0.6;
        }
        #chat-input:disabled {
            background: #f3f3f3;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>AI Interview Assistant</h2>
        
        <div class="instructions-panel" id="instructions-panel">
            <h3>📋 Interview Instructions</h3>
            <ul>
                <li><strong>Text Mode:</strong> Type your responses in the text box below</li>
                <li><strong>Voice Mode:</strong> Click "Start Recording" to speak your answer</li>
                <li><strong>TTS:</strong> Toggle voice responses on/off using the switch</li>
                <li><strong>Tips:</strong> Speak clearly and in a quiet environment for best results</li>
            </ul>
        </div>

        <div class="control-panel">            
            <div class="toggle-switch">
                <input type="checkbox" id="tts-toggle" checked>
                <label for="tts-toggle">🔊 Voice Responses</label>
            </div>
            <button id="end-session-btn" disabled style="opacity: 0.5; cursor: not-allowed;">🚪 End Session</button>
        </div>

        <div id="status"></div>

        <div id="chat-box">
            <!-- Messages will appear here -->
        </div>

        <form id="chat-form">
            <textarea id="chat-input" placeholder="Type your message..." required></textarea>
            <button type="button" id="record-toggle" class="chat-mic"></button>
            <button type="submit" class="chat-send">➤</button>
        </form>
    </div>

    <script>
        // ===================================================================
        // STATE VARIABLES
        // ===================================================================
        let sessionToken = null;  // REMOVED localStorage
        let sessionStartTime = null;  // REMOVED localStorage
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let seenMessageIds = new Set();
        let currentAudio = null;
        let ttsEnabled = true;
        let isSessionCompleted = false;
        let pollingInterval = null;  // NEW: Track polling interval
        let isInitializing = false;  // NEW: Prevent duplicate initialization
        const MIN_SESSION_DURATION_MS = 0;  // allow ending the session at any time

        // ===================================================================
        // UTILITY FUNCTIONS
        // ===================================================================
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        function scrollToBottom() {
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function disableChatInputs() {
            const input = document.getElementById('chat-input');
            const sendBtn = document.querySelector('#chat-form button[type="submit"]');
            const micBtn = document.getElementById('record-toggle');

            input.disabled = true;
            input.placeholder = "Session has ended";
            sendBtn.disabled = true;
            micBtn.disabled = true;

            document.querySelector('.chat-container').classList.add('session-ended');
            document.getElementById('chat-form').onsubmit = function (e) {
                e.preventDefault();
                return false;
            };
        }

        // ===================================================================
        // SESSION COMPLETION + POST-INTERVIEW SURVEY
        // ===================================================================
        let completionHandled = false;

        function onSessionCompleted() {
            if (completionHandled) return;
            completionHandled = true;
            updateStatus('Session completed');
            isSessionCompleted = true;
            updateEndSessionButton();
            disableChatInputs();
            if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
            // Keep the session token until the survey is submitted (the survey
            // endpoint needs it), then clear it and offer a fresh start.
            showSurvey();
        }

        function finishAfterSurvey() {
            sessionStorage.removeItem('candor_session_token');
            showStartOver();
        }

        async function showSurvey() {
            if (document.getElementById('survey-panel')) return;
            let battery;
            try {
                const resp = await fetch('/api/survey/battery');
                battery = (await resp.json()).battery;
            } catch (e) {
                console.error('Could not load survey', e);
                finishAfterSurvey();
                return;
            }
            if (!battery || !((battery.likert_items || []).length + (battery.open_items || []).length)) {
                finishAfterSurvey();
                return;
            }

            const scale = battery.scale || {};
            const labels = scale.labels || {};
            const min = scale.min || 1, max = scale.max || 5;

            const panel = document.createElement('div');
            panel.id = 'survey-panel';
            panel.style.cssText = 'max-width:720px;margin:24px auto;padding:24px;background:#fff;border:1px solid #e2e2e2;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,0.06);';

            let html = `<h2 style="margin-top:0;font-size:20px;">${battery.title || 'Post-interview questionnaire'}</h2>`;
            if (battery.instructions) html += `<p style="color:#555;font-size:14px;">${battery.instructions}</p>`;

            // Likert items
            (battery.likert_items || []).forEach(item => {
                html += `<div class="survey-item" style="margin:18px 0;padding-bottom:12px;border-bottom:1px solid #f0f0f0;">
                    <div style="font-weight:600;margin-bottom:10px;">${item.text}</div>
                    <div style="display:flex;gap:6px;flex-wrap:wrap;">`;
                for (let v = min; v <= max; v++) {
                    const lbl = labels[String(v)] || v;
                    html += `<label style="flex:1;min-width:90px;text-align:center;font-size:12px;color:#444;cursor:pointer;border:1px solid #ddd;border-radius:6px;padding:8px 4px;">
                        <input type="radio" name="likert_${item.key}" value="${v}" style="display:block;margin:0 auto 4px;">${lbl}</label>`;
                }
                html += `</div></div>`;
            });

            // Open-ended items
            (battery.open_items || []).forEach(item => {
                html += `<div class="survey-item" style="margin:18px 0;">
                    <div style="font-weight:600;margin-bottom:8px;">${item.text}</div>
                    <textarea name="open_${item.key}" rows="3" style="width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:6px;padding:8px;font-family:inherit;font-size:14px;"></textarea>
                </div>`;
            });

            html += `<div id="survey-error" style="color:#c0392b;font-size:13px;margin:8px 0;display:none;"></div>
                <div style="display:flex;gap:12px;margin-top:16px;">
                    <button id="survey-submit" style="background:#667eea;color:#fff;padding:12px 24px;border:none;border-radius:6px;cursor:pointer;font-size:15px;font-weight:600;">Submit</button>
                    <button id="survey-skip" style="background:transparent;color:#888;padding:12px 16px;border:none;cursor:pointer;font-size:14px;">Skip</button>
                </div>`;
            panel.innerHTML = html;

            const container = document.querySelector('.chat-container') || document.body;
            container.appendChild(panel);
            panel.scrollIntoView({ behavior: 'smooth' });

            document.getElementById('survey-skip').onclick = () => { panel.remove(); finishAfterSurvey(); };
            document.getElementById('survey-submit').onclick = () => submitSurvey(battery, panel);
        }

        async function submitSurvey(battery, panel) {
            const likert = {}, open = {};
            let answered = 0;
            (battery.likert_items || []).forEach(item => {
                const sel = panel.querySelector(`input[name="likert_${item.key}"]:checked`);
                if (sel) { likert[item.key] = parseInt(sel.value, 10); answered++; }
            });
            (battery.open_items || []).forEach(item => {
                const ta = panel.querySelector(`textarea[name="open_${item.key}"]`);
                if (ta && ta.value.trim()) open[item.key] = ta.value.trim();
            });

            if (answered === 0 && Object.keys(open).length === 0) {
                const err = document.getElementById('survey-error');
                err.textContent = 'Please answer at least one question, or click Skip.';
                err.style.display = 'block';
                return;
            }

            const btn = document.getElementById('survey-submit');
            btn.disabled = true; btn.textContent = 'Submitting…';
            try {
                await fetch('/api/survey/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_token: sessionToken, likert, open }),
                });
            } catch (e) {
                console.error('Survey submit failed', e);
            }
            panel.innerHTML = '<p style="text-align:center;padding:20px;font-size:16px;">Thank you — your responses have been recorded.</p>';
            finishAfterSurvey();
        }

        function showStartOver() {
            if (document.getElementById('start-over-btn')) return;
            const panel = document.querySelector('.control-panel');
            if (!panel) return;
            const btn = document.createElement('button');
            btn.id = 'start-over-btn';
            btn.textContent = '＋ New conversation';
            btn.style.cssText = 'background:#4CAF50;color:#fff;padding:12px 24px;border:none;border-radius:4px;cursor:pointer;font-size:16px;';
            btn.onclick = () => { sessionStorage.removeItem('candor_session_token'); window.location.href = '/'; };
            panel.appendChild(btn);
        }

        function appendMessage(role, text, messageId) {
            if (messageId && seenMessageIds.has(messageId)) {
                return false;
            }
            
            if (messageId) {
                seenMessageIds.add(messageId);
            }

            const chatBox = document.getElementById('chat-box');
            const isUser = role === 'user' || role === 'User';
            const className = isUser ? 'user' : 'bot';
            const imgUrl = isUser 
                ? "https://e7.pngegg.com/pngimages/178/595/png-clipart-user-profile-computer-icons-login-user-avatars-monochrome-black-thumbnail.png"
                : "https://uploads-ssl.webflow.com/64e02bd14ada8a57fa327cbe/64e445ced8cf185ffb9bb1b9_Rex%20Small_.png";
            
            chatBox.innerHTML += `
                <div class="message ${className}" data-msg-id="${messageId || ''}">
                    <img src="${imgUrl}" alt="${role}">
                    <p>${text.replace(/\n/g, '<br>')}</p>
                </div>`;
            scrollToBottom();
            return true;
        }

        function stopCurrentAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
                updateStatus('');
            }
        }

        // ===================================================================
        // AUDIO PLAYBACK
        // ===================================================================
        async function playMessageAudio(text, retries = 5) {
            if (!text || !ttsEnabled) return;

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`/api/get-voice-response?text=${encodeURIComponent(text)}`);

                    if (!response.ok) {
                        console.warn(`TTS fetch failed: ${response.status}`);
                        return;
                    }

                    const blob = await response.blob();
                    const audioUrl = URL.createObjectURL(blob);
                    
                    stopCurrentAudio();
                    
                    currentAudio = new Audio(audioUrl);
                    currentAudio.onended = () => {
                        URL.revokeObjectURL(audioUrl);
                        currentAudio = null;
                        updateStatus('');
                    };
                    currentAudio.onplay = () => {
                        updateStatus('🔊 Playing response...');
                    };
                    
                    await currentAudio.play();
                    return;
                } catch (error) {
                    console.warn(`TTS attempt ${i + 1} failed:`, error);
                }
            }
        }

        // ===================================================================
        // SESSION INITIALIZATION - FIXED!
        // ===================================================================
        function initializeSession() {
            // The session was created on the landing page (/). We just pick up
            // the token here. If there isn't one, send the user back to choose.
            if (isInitializing || sessionToken) {
                return;
            }
            isInitializing = true;

            const storedToken = sessionStorage.getItem('candor_session_token');
            if (!storedToken) {
                updateStatus('No conversation selected — redirecting…');
                window.location.href = '/';
                return;
            }

            sessionToken = storedToken;
            sessionStartTime = Date.now();
            updateStatus('Session started. Ready to chat!');

            // Start polling for interviewer messages.
            if (!pollingInterval) {
                pollingInterval = setInterval(pollForMessages, 1500);
            }
            setInterval(updateEndSessionButton, 1000);
            pollForMessages();

            isInitializing = false;
        }

        // ===================================================================
        // MESSAGE POLLING
        // ===================================================================
        async function pollForMessages() {
            if (!sessionToken) return;
            
            try {
                const response = await fetch(`/api/get-messages?session_token=${sessionToken}`);
                
                if (response.status === 400) {
                    const err = await response.json();
                    console.warn('Session invalid:', err);
                    sessionToken = null;
                    clearInterval(pollingInterval);
                    pollingInterval = null;
                    sessionStorage.removeItem('candor_session_token');
                    updateStatus('Session expired — redirecting…');
                    setTimeout(() => { window.location.href = '/'; }, 1500);
                    return;
                }

                const data = await response.json();
                
                if (data.success && data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        if (msg.role === 'Interviewer' || msg.role === 'assistant') {
                            const wasNew = appendMessage('bot', msg.content, msg.id);
                            if (wasNew && msg.id) {
                                playMessageAudio(msg.content);
                            }
                        } else if (msg.role === 'User' || msg.role === 'user') {
                            appendMessage('user', msg.content, msg.id);
                        }
                    });
                }

                if (data.session_completed) {
                    onSessionCompleted();
                }
            } catch (error) {
                console.error('Polling error', error);
            }
        }

        // ===================================================================
        // END SESSION BUTTON
        // ===================================================================
        function updateEndSessionButton() {
            const btn = document.getElementById('end-session-btn');
            if (!btn) return;

            if (isSessionCompleted) {
                btn.disabled = true;
                btn.title = "Session has ended";
                btn.style.opacity = "0.5";
                btn.style.cursor = "not-allowed";
                return;
            }

            if (sessionStartTime) {
                const elapsed = Date.now() - sessionStartTime;
                
                if (elapsed < MIN_SESSION_DURATION_MS) {
                    btn.disabled = true;
                    const remaining = Math.ceil((MIN_SESSION_DURATION_MS - elapsed) / 60000);
                    btn.title = `Session must be at least 45 minutes long (${remaining}m remaining)`;
                    btn.style.opacity = "0.5";
                    btn.style.cursor = "not-allowed";
                } else {
                    btn.disabled = false;
                    btn.title = "End Session";
                    btn.style.opacity = "1";
                    btn.style.cursor = "pointer";
                }
            }
        }

        // ===================================================================
        // VOICE RECORDING
        // ===================================================================
        function startRecording(stream) {
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = function(event) {
                audioChunks.push(event.data);
            };
            
            mediaRecorder.onstop = sendAudioToServer;
            mediaRecorder.start();
            updateStatus('🎤 Recording...');
        }

        async function sendAudioToServer() {
            if (!sessionToken) {
                console.error('Session not initialized');
                updateStatus('Session not initialized');
                return;
            }

            updateStatus('Processing your speech...');

            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            const formData = new FormData();
            formData.append('audio', audioBlob);
            formData.append('session_token', sessionToken);

            try {
                const response = await fetch('/api/send-voice', { 
                    method: 'POST', 
                    body: formData 
                });
                const data = await response.json();
                
                if (data.success) {
                    const tempId = 'user-' + Date.now();
                    appendMessage('user', data.transcribed_text, tempId);
                    updateStatus('Waiting for response...');
                } else {
                    console.error('send-voice failed', data);
                    updateStatus('Failed to process voice');
                }
            } catch (error) {
                console.error('Error sending voice', error);
                updateStatus('Error sending voice');
            }
        }

        function toggleRecording() {
            if (isSessionCompleted) {
                updateStatus('Session has ended. Recording disabled.');
                return;
            }

            const recordButton = document.getElementById('record-toggle');
            
            if (isRecording) {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
                recordButton.classList.remove('recording');
                recordButton.title = "Start Recording";
            } else {
                stopCurrentAudio();
                
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        startRecording(stream);
                        recordButton.classList.add('recording');
                        recordButton.title = "Stop Recording";
                    })
                    .catch(error => {
                        console.error('Error accessing microphone:', error);
                        updateStatus('Error: Could not access microphone');
                    });
            }
            
            isRecording = !isRecording;
        }

        // ===================================================================
        // TEXT CHAT
        // ===================================================================
        document.getElementById('chat-form').onsubmit = async function(event) {
            event.preventDefault();

            if (isSessionCompleted) {
                updateStatus('Session has ended. You can no longer send messages.');
                return;
            }
            
            if (!sessionToken) {
                updateStatus('Session not initialized yet. Please wait.');
                return;
            }

            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            
            if (!text) return;
            
            input.value = '';
            stopCurrentAudio();

            const tempMsgId = 'user-' + Date.now();
            appendMessage('user', text, tempMsgId);

            try {
                const response = await fetch('/api/send-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        session_token: sessionToken,
                        message: text,
                        type: "CONVERSATION"
                    }),
                });

                const result = await response.json();
                
                if (!result.success) {
                    console.error('Message send failed:', result);
                    if (result.session_completed) {
                        updateStatus('Session has ended');
                    }
                }
            } catch (error) {
                console.error('Error sending message:', error);
            }
        };

        // ===================================================================
        // EVENT LISTENERS
        // ===================================================================
        document.getElementById('chat-input').addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                document.getElementById('chat-form').dispatchEvent(new Event('submit'));
            }
        });

        document.getElementById('tts-toggle').addEventListener('change', function(event) {
            ttsEnabled = event.target.checked;
            if (!ttsEnabled) {
                stopCurrentAudio();
            }
            updateStatus(ttsEnabled ? 'Voice responses enabled' : 'Voice responses disabled');
            setTimeout(() => updateStatus(''), 2000);
        });

        document.getElementById('record-toggle').onclick = toggleRecording;

        document.getElementById('end-session-btn').onclick = async function() {
            if (!confirm('Are you sure you want to end this session? Your interview will be completed.')) {
                return;
            }

            if (!sessionToken) {
                updateStatus('No active session to end');
                return;
            }

            try {
                updateStatus('Ending session...');
                stopCurrentAudio();

                const response = await fetch('/api/end-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        session_token: sessionToken
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    updateStatus('Session ended. Thank you for participating!');
                    onSessionCompleted();
                } else {
                    updateStatus('Failed to end session: ' + (result.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error ending session:', error);
                updateStatus('Error ending session');
            }
        };

        // ===================================================================
        // INITIALIZATION - ONLY CALLED ONCE!
        // ===================================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, initializing session...');
            initializeSession();
        });
    </script>
</body>
</html>
